<style>
  :root {
    --scale: 1;
    --title-scale: 1;
    --txt-base: 18px;
    --font-ui: 'Ubuntu Condensed', sans-serif;
    --font-brand: 'Ubuntu', sans-serif;
    --font-mono: 'Ubuntu Mono', monospace;
  }
  /* ---- RETRO '79 DARK ----
     Paleta exacta: #202020 #EAE0C7 #FBBA00 #FF9201 #FD520A #B5B2AD #44ABB4 #246291 */
  html[data-theme="dark"] {
    --bg:       #202020;
    --s1:       #2a2722;
    --s2:       #333028;
    --s3:       #3c382e;
    --text:     #EAE0C7;
    --text-dim: #8a857a;
    --accent:   #FF9201;
    --primary:  #FBBA00;
    --teal:     #44ABB4;
    --navy:     #246291;
    --graybeige:#B5B2AD;
    --err:      #FD520A;
    --btn-shadow: 2px 2px 0 rgba(0, 0, 0, 0.45);
  }
  /* ---- RETRO '79 LIGHT (gris claro de la paleta, texto casi negro) ---- */
  html[data-theme="light"] {
    --bg:       #B5B2AD;
    --s1:       #C4C1BA;
    --s2:       #D2CFC7;
    --s3:       #96938A;
    --text:     #202020;
    --text-dim: #55524a;
    --accent:   #D66F00;
    --primary:  #A87400;
    --teal:     #246291;
    --navy:     #1b4a6e;
    --graybeige:#8f8c84;
    --err:      #C43D14;
    --btn-shadow: 2px 2px 0 rgba(32, 32, 32, 0.3);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-weight: 300;
    -webkit-font-smoothing: antialiased;
    min-height: 100dvh;
    transition: background .2s;
  }
  button { font-family: inherit; cursor: pointer; }
  h1 { margin: 0; }

  /* ══════════ RETRO BUTTON ══════════ */
  .retro-btn {
    width: 100%; max-width: 400px;
    background: var(--s1);
    border: 1px solid var(--s3);
    border-left: 3px solid var(--accent);
    padding: 13px 18px;
    display: flex; align-items: center; gap: 16px;
    color: var(--text);
    user-select: none; text-align: left;
    box-shadow: var(--btn-shadow);
    transition: background .15s, box-shadow .1s, transform .1s;
  }
  .retro-btn:hover { background: var(--s2); }
  .retro-btn:active { transform: translateY(1px); box-shadow: none; }
  .retro-btn:disabled { opacity: .45; cursor: default; }
  .retro-btn.primary { border-left-color: var(--primary); background: var(--s2); }
  .retro-btn.primary .retro-btn-icon, .retro-btn.primary .retro-btn-text { color: var(--primary); }
  .retro-btn.selected { border-left-color: var(--navy); }
  .retro-btn.selected .retro-btn-text { color: var(--navy); }
  .retro-btn.tone-del { border-left-color: var(--err); }
  .retro-btn.tone-del .retro-btn-icon, .retro-btn.tone-del .retro-btn-text { color: var(--err); }
  .retro-btn.tone-home { border-left-color: var(--teal); }
  .retro-btn.tone-home .retro-btn-icon, .retro-btn.tone-home .retro-btn-text { color: var(--teal); }
  .top-btn.tone-home { border-left-color: var(--teal); color: var(--teal); }
  .retro-btn-icon { font-size: 20px; color: var(--accent); width: 24px; text-align: center; flex-shrink: 0; }
  .retro-btn-body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .retro-btn-text {
    font-family: var(--font-ui); font-weight: 400; font-size: 14px;
    color: var(--text); letter-spacing: 1px; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .retro-btn-sub {
    font-family: var(--font-mono); font-size: 10px; color: var(--text-dim);
    letter-spacing: .5px; text-transform: uppercase;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .back-btn { max-width: 220px; margin: 0 auto; }
  .regresar-btn { border: 1px dashed var(--teal); border-left: 3px dashed var(--teal); background: rgba(68,171,180,.08); box-shadow: none; }
  .regresar-btn .retro-btn-icon, .regresar-btn .retro-btn-text { color: var(--teal); }
  .regresar-btn:hover { background: rgba(68,171,180,.16); }

  /* small top toolbar buttons */
  .top-btn {
    background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--accent);
    color: var(--text); font-family: var(--font-ui); font-weight: 400;
    font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
    padding: 7px 12px; box-shadow: var(--btn-shadow);
    transition: background .15s, transform .1s, box-shadow .1s;
  }
  .top-btn:hover { background: var(--s2); }
  .top-btn:active { transform: translateY(1px); box-shadow: none; }
  .top-btn.primary { border-left-color: var(--primary); color: var(--primary); }

  /* ══════════ FULL-SCREEN PAGES ══════════ */
  .page-layer { position: fixed; inset: 0; }
  .page {
    position: absolute; inset: 0; background: var(--bg);
    overflow-y: auto;
  }
  .page-inner {
    min-height: 100%;
    max-width: 460px; margin: 0 auto; padding: 44px 20px 60px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
  }
  .page-inner.wide { max-width: 640px; }
  .page-title {
    font-family: var(--font-brand); font-weight: 700; font-size: 22px; color: var(--primary);
    letter-spacing: 3px; text-align: center; text-transform: uppercase;
  }
  .page-sub {
    font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
    letter-spacing: 1px; text-align: center; max-width: 340px; line-height: 1.6;
  }
  .page-opts { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 6px; }

  .dim-note { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); letter-spacing: .5px; line-height: 1.6; max-width: 380px; }
  .dim-note.center { text-align: center; }
  .err-note { font-family: var(--font-mono); font-size: 11px; color: var(--err); letter-spacing: .5px; }

  /* editor pieces inside pages */
  .ed-label {
    font-family: var(--font-mono); font-size: 10px; color: var(--teal);
    letter-spacing: 2px; text-transform: uppercase; align-self: flex-start; margin-top: 10px;
  }
  .input {
    width: 100%; max-width: 400px;
    font-family: var(--font-ui); font-weight: 300; font-size: 16px;
    color: var(--text); background: var(--s1);
    border: 1px solid var(--s3); border-left: 3px solid var(--accent);
    padding: 11px 14px; outline: none;
  }
  .input:focus { background: var(--s2); border-left-color: var(--primary); }
  textarea.input, .lyric-ta { min-height: 110px; resize: vertical; line-height: 1.6; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 400px; }
  .ed-actions { display: flex; gap: 10px; width: 100%; max-width: 400px; margin-top: 16px; flex-wrap: wrap; }
  .ed-actions .retro-btn { flex: 1; min-width: 150px; }

  .letter-row { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 400px; }
  .letter-row.wrap { max-width: 460px; }
  .letter-opt {
    min-width: 48px; height: 44px; padding: 0 12px;
    background: var(--s1); border: 1px solid var(--s3); color: var(--text);
    font-family: var(--font-ui); font-size: 17px; letter-spacing: 1px;
    box-shadow: var(--btn-shadow);
  }
  .letter-opt:hover { background: var(--s2); }
  .letter-opt:active { transform: translateY(1px); box-shadow: none; }
  .letter-opt.on { border-color: var(--navy); color: var(--navy); background: var(--s2); }
  .letter-opt.dim { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

  .mods-row, .name-list { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 400px; }
  .mod-opt {
    padding: 9px 13px; background: var(--s1); border: 1px solid var(--s3); color: var(--text);
    font-family: var(--font-ui); font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    box-shadow: var(--btn-shadow);
  }
  .mod-opt:hover { background: var(--s2); }
  .mod-opt.on { border-color: var(--navy); color: var(--navy); background: var(--s2); }
  .mod-opt.small { padding: 7px 11px; min-width: 34px; text-align: center; }

  /* inline accordion panel used throughout edit mode instead of full pages */
  .inline-panel {
    width: 100%; display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
    background: var(--s1); border: 1px dashed var(--accent); padding: 14px 16px 16px; margin: 10px 0 18px;
  }
  .inline-panel .ed-actions, .inline-panel .letter-row, .inline-panel .mods-row,
  .inline-panel .name-list, .inline-panel .fig-row, .inline-panel .chord-preview,
  .inline-panel .namepick, .inline-panel .reps-editor { max-width: none; width: 100%; }
  .lyric-ta.big { min-height: 240px; }

  /* || TAMAÑO A- A+ control */
  .size-control { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--teal); letter-spacing: 1.5px; text-transform: uppercase; }
  .sc-bars .bar1 { opacity: .8; }
  .sc-bars .bar2 { font-weight: 700; }
  .sc-btn { background: var(--s1); border: 1px solid var(--s3); color: var(--accent); font-family: var(--font-mono); font-size: 10px; padding: 4px 7px; }
  .sc-btn:hover { color: var(--primary); border-color: var(--primary); }
  .section-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; border-bottom: 1px solid var(--s3); padding-bottom: 7px; margin-bottom: 16px; }
  .section-head .block-h { border-bottom: 0; padding-bottom: 0; margin-bottom: 0; }
  .mcell.open-target { border-left-color: var(--primary); border-left-width: 3px; }

  .fig-row { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 460px; }
  .fig-opt {
    flex: 1; min-width: 76px;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end; gap: 6px;
    padding: 10px 6px; min-height: 96px;
    background: var(--s1); border: 1px solid var(--s3); color: var(--text);
    font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase;
    box-shadow: var(--btn-shadow);
  }
  .fig-opt .figbox { color: var(--text); display: flex; align-items: flex-end; min-height: 52px; }
  .fig-opt.on { border-color: var(--navy); color: var(--navy); background: var(--s2); }
  .fig-opt.on .figbox { color: var(--navy); }

  .chord-preview {
    display: flex; align-items: center; gap: 14px; width: 100%; max-width: 400px;
    font-family: var(--font-ui); font-size: 30px; color: var(--primary);
  }
  .chip-btn {
    background: transparent; border: 1px solid var(--s3); color: var(--text-dim);
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    padding: 5px 10px;
  }
  .chip-btn:hover { color: var(--accent); border-color: var(--accent); }
  .reps-editor { display: flex; align-items: center; gap: 10px; }
  .reps-num { font-family: var(--font-ui); font-size: 24px; color: var(--primary); min-width: 54px; text-align: center; }
  .num-editor { display: flex; align-items: center; gap: 10px; }
  .num-val { font-family: var(--font-ui); font-size: 30px; color: var(--primary); min-width: 120px; text-align: center; }
  .num-val small { font-size: 13px; color: var(--text-dim); }

  .namepick { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }

  .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(92px, 1fr)); gap: 10px; width: 100%; max-width: 420px; }
  .folder-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 16px 8px 12px; background: var(--s1); border: 1px solid var(--s3);
    border-left: 3px solid var(--accent); color: var(--accent);
    box-shadow: var(--btn-shadow);
  }
  .folder-btn:hover { background: var(--s2); }
  .folder-btn span { font-family: var(--font-ui); font-size: 18px; color: var(--text); letter-spacing: 1px; }

  /* ══════════ NEW NAV: icons, brand block, search, picker ══════════ */
  .top-icons { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center;
    background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--accent);
    color: var(--accent); font-size: 17px; box-shadow: var(--btn-shadow); flex: none;
  }
  .icon-btn:hover { background: var(--s2); }
  .icon-btn:active { transform: translateY(1px); box-shadow: none; }
  .icon-btn.tone-home { border-left-color: var(--primary); color: var(--primary); }

  .brand-block { display: flex; align-items: center; gap: 10px; }
  .brand-block.small .brand-icon { width: 32px; height: 32px; }
  .brand-icon { width: 44px; height: 44px; object-fit: contain; }
  .brand-name { font-family: var(--font-brand); font-weight: 700; font-size: 14px; color: var(--primary); letter-spacing: 2px; }
  .brand-slogan { font-family: var(--font-mono); font-size: 9px; color: var(--teal); letter-spacing: 1.5px; text-transform: uppercase; }
  .brand-slogan .bar1 { opacity: .8; }
  .brand-slogan .bar2 { font-weight: 700; }

  .search-bar {
    width: 100%; max-width: 400px; font-family: var(--font-ui); font-size: 14px;
    color: var(--text); background: var(--s2); border: 1px solid var(--s3); border-left: 3px solid var(--teal);
    padding: 10px 14px; outline: none; margin-bottom: 4px;
  }
  .search-bar:focus { border-left-color: var(--primary); }
  .song-picker { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .picker-list { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .picker-action { width: 100%; display: flex; justify-content: center; margin-top: 6px; }
  .button-row { display: flex; flex-wrap: wrap; gap: 8px; width: 100%; max-width: 460px; justify-content: center; }
  .button-row .retro-btn, .button-row .top-btn { flex: 1 1 auto; min-width: 130px; width: auto; max-width: none; }

  .page-topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; width: 100%; max-width: 460px; margin-bottom: 6px; }

  .list-row { display: flex; align-items: center; gap: 10px; width: 100%; max-width: 420px; background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--accent); padding: 8px 12px; box-shadow: var(--btn-shadow); }
  .list-row.off { opacity: .45; border-left-color: var(--s3); }
  .list-row .lr-num { font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); width: 22px; text-align: center; flex: none; }
  .list-row .lr-num-btn { font-family: var(--font-mono); font-size: 13px; color: var(--primary); width: 26px; height: 26px; background: var(--s2); border: 1px solid var(--s3); flex: none; }
  .list-row .lr-name { flex: 1; text-align: left; font-family: var(--font-ui); font-size: 14px; color: var(--text); background: none; border: 0; }
  .list-row .lr-icon { width: 30px; height: 30px; background: var(--s2); border: 1px solid var(--s3); color: var(--accent); font-size: 13px; flex: none; }
  .list-row .lr-icon.del { color: var(--err); }
  .list-row .lr-icon.toggle.off-state { color: var(--text-dim); }

  .qr-holder { background: #fff; padding: 16px; box-shadow: var(--btn-shadow); border: 1px solid var(--s3); }
  .share-btn {
    font-family: var(--font-ui); font-weight: 400; font-size: 18px; color: var(--primary);
    background: var(--s2); border: 1px solid var(--s3); border-left: 4px solid var(--primary);
    padding: 12px 22px; letter-spacing: 1px; box-shadow: var(--btn-shadow);
  }
  .share-btn:hover { background: var(--s1); }
  .qr-holder img { display: block; width: 230px; height: 230px; }

  .help-text { max-width: 420px; font-weight: 300; font-size: 14.5px; line-height: 1.7; letter-spacing: .3px; }
  .help-text p { margin: 0 0 12px; }
  .help-text b { font-weight: 500; color: var(--primary); text-transform: uppercase; font-size: 12.5px; letter-spacing: 1px; }

  .addsong-lyrics { display: flex; flex-direction: column; gap: 14px; width: 100%; max-width: 400px; }
  .lyr-block { position: relative; display: flex; flex-direction: column; gap: 8px; padding: 12px; border: 1px solid var(--s3); background: var(--s1); }
  .lyr-del { position: absolute; top: 6px; right: 6px; z-index: 2; background: transparent; border: 0; color: var(--text-dim); font-size: 14px; }
  .lyr-del:hover { color: var(--err); }

  /* ══════════ HOME ══════════ */
  .home {
    position: relative;
    min-height: 100dvh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 44px 20px; gap: 26px;
  }
  .home-topicons { position: absolute; top: 18px; right: 18px; }
  .home-brand { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .home-icon { width: 88px; height: 88px; object-fit: contain; }
  .home-name { font-family: var(--font-brand); font-weight: 700; font-size: 30px; color: var(--primary); letter-spacing: 5px; text-align: center; }
  .home-namesvg { max-width: 300px; max-height: 60px; }
  .home-sub { font-family: var(--font-mono); font-size: 10px; color: var(--teal); letter-spacing: 2px; text-transform: uppercase; }
  .home-sub .bar1 { opacity: .8; }
  .home-sub .bar2 { font-weight: 700; }
  .home-divider { width: 300px; height: 1px; background: var(--s3); margin-top: 8px; }
  .home-menu { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
  @media (max-width: 820px) {
    .home { padding: 64px 16px 24px; gap: 16px; }
    .home-icon { width: 60px; height: 60px; }
    .home-name { font-size: 22px; letter-spacing: 3px; }
    .home-divider { width: 220px; }
    .home-menu { gap: 8px; }
  }

  /* ══════════ SONG SCREEN ══════════ */
  .app { max-width: 1240px; margin: 0 auto; padding: 18px clamp(12px, 3vw, 36px) 80px; }
  .topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .top-left, .top-right { display: flex; gap: 8px; flex-wrap: wrap; }

  .titlebar { margin-bottom: 8px; }
  .title-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
  .title-size-row { display: flex; justify-content: flex-end; margin-bottom: 6px; }
  .meta-wrap { margin-bottom: 4px; }
  .song-title {
    font-family: var(--font-brand); font-weight: 700;
    font-size: calc(30px * var(--sec-scale, 1)); color: var(--primary);
    letter-spacing: 2px; line-height: 1.15;
  }
  .edit-title {
    width: 100%; background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--primary);
    padding: 6px 12px; outline: none;
  }
  .edit-hint { font-family: var(--font-mono); font-size: 11px; color: var(--teal); letter-spacing: 1px; margin-top: 8px; text-transform: uppercase; }
  .edit-hint .bar1 { opacity: .8; }
  .edit-hint .bar2 { font-weight: 700; }
  .metro-toggle .bar1 { opacity: .8; }
  .metro-toggle .bar2 { font-weight: 700; }
  .edit-hint.top { margin: 0 0 8px; }

  .meta-line {
    font-family: var(--font-mono); font-size: calc(var(--txt-base) * var(--sec-scale, 1)); color: var(--text-dim);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .meta-btn {
    background: var(--s1); border: 1px solid var(--s3); border-left: 3px solid var(--accent);
    color: var(--text); font-family: var(--font-mono); font-size: 11px; letter-spacing: 1.5px;
    padding: 8px 12px; text-transform: uppercase; box-shadow: var(--btn-shadow);
    display: inline-flex; align-items: center; gap: 8px;
  }
  .meta-btn:hover { background: var(--s2); }
  .meta-btn.static { cursor: default; }
  .meta-btn .sz {
    background: var(--s2); border: 1px solid var(--s3); color: var(--accent);
    font-family: var(--font-ui); font-size: 11px; padding: 3px 8px;
  }
  .meta-btn .sz:hover { color: var(--primary); }

  /* metronome inline */
  .metro-inline { margin-bottom: 20px; }
  .metro-toggle { cursor: pointer; }
  .metro-body { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
  .metro-inline.open .metro-body { max-height: 140px; }
  .metro-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; padding: 16px 4px 6px; }
  .metro-play {
    width: 46px; height: 46px; border: 1px solid var(--s3); border-left: 3px solid var(--teal);
    background: var(--s1); color: var(--teal); font-size: 16px; box-shadow: var(--btn-shadow);
  }
  .metro-play:active { transform: translateY(1px); box-shadow: none; }
  .metro-bpm { font-family: var(--font-ui); font-weight: 400; font-size: calc(30px * var(--sec-scale, 1)); color: var(--text); display: flex; align-items: baseline; gap: 6px; }
  .metro-bpm small { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); }
  .metro-controls { display: inline-flex; gap: 6px; }
  .metro-step {
    width: 32px; height: 32px; background: var(--s1); border: 1px solid var(--s3);
    color: var(--accent); font-size: 15px; padding: 0; box-shadow: var(--btn-shadow);
  }
  .metro-step:active { transform: translateY(1px); box-shadow: none; }
  .metro-dots { display: flex; gap: 12px; align-items: center; }
  .mdot-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; }
  .mdot { width: 13px; height: 13px; border-radius: 50%; background: var(--teal); opacity: .25; transition: opacity .06s, transform .06s; }
  .mdot.on { opacity: 1; transform: scale(1.15); }
  .mdot-wrap.first .mdot { background: var(--primary); }
  .mdot-wrap.first::before {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: var(--primary); opacity: .18; transform: scale(.6); transition: opacity .06s, transform .06s;
  }
  .mdot-wrap.first:has(.mdot.on)::before { opacity: .4; transform: scale(1.25); }
  @media (max-width: 820px) { .metro-row { justify-content: center; text-align: center; } }
  .metro-name { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }

  /* song blocks */
  .song-block { margin-bottom: 30px; min-width: 0; }
  .block-h {
    font-family: var(--font-mono); font-size: 11px; color: var(--teal);
    letter-spacing: 3px; text-transform: uppercase;
    border-bottom: 1px solid var(--s3); padding-bottom: 7px; margin-bottom: 16px;
  }
  .block-h .bar1 { opacity: .8; }
  .block-h .bar2 { font-weight: 700; }
  .col { min-width: 0; }
  .split-h { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; align-items: start; }
  .split-v { display: flex; flex-direction: column; }
  @media (max-width: 820px) { .split-h { grid-template-columns: 1fr; gap: 0; } }

  .grp-wrap { margin-bottom: 34px; padding-bottom: 22px; border-bottom: 1px dashed var(--s3); }
  .grp-wrap:last-of-type { border-bottom: 0; }
  .grp { display: flex; gap: 14px; margin-bottom: 0; align-items: flex-start; flex-wrap: wrap; }
  .glabel {
    position: relative;
    font-family: var(--font-ui); font-weight: 400;
    font-size: calc(20px * var(--sec-scale, 1)); color: var(--accent);
    background: var(--s1); border: 1px solid var(--s3);
    width: calc(42px * var(--sec-scale, 1)); height: calc(42px * var(--sec-scale, 1));
    flex: none; display: inline-flex; align-items: center; justify-content: center;
    box-shadow: var(--btn-shadow);
  }
  .glabel.small { width: 32px; height: 32px; font-size: 16px; box-shadow: none; }
  .gdel {
    position: absolute; top: -9px; right: -9px; width: 20px; height: 20px;
    border: 1px solid var(--s3); background: var(--s1); color: var(--text-dim);
    font-size: 11px; line-height: 1; padding: 0;
  }
  .gdel:hover { color: var(--err); border-color: var(--err); }

  /* ---- bars: every visual row auto-gets | at both ends ---- */
  .bars { display: flex; flex-wrap: wrap; align-items: stretch; align-content: flex-start; flex: 1; min-width: 0; row-gap: 14px; }
  .mcell {
    position: relative; flex: 0 0 auto;
    border: 0; border-left: 2px solid var(--text-dim); border-right: 2px solid var(--text-dim);
    margin-right: -2px;
    background: transparent; color: var(--text);
    padding: 4px 14px; display: flex; align-items: center; justify-content: center; gap: 8px;
    min-height: calc(56px * var(--sec-scale, 1));
  }
  .mcell:disabled { cursor: default; }
  .mcell.editable { cursor: pointer; }
  .mcell.editable:hover { background: var(--s1); }
  .mcell .chord { font-family: var(--font-ui); font-weight: 400; font-size: calc(var(--txt-base) * var(--sec-scale, 1) + var(--chord-offset, 2px)); letter-spacing: .5px; line-height: 1; color: var(--text); }
  .mcell .figbox { display: inline-flex; align-items: center; color: var(--text); }
  .mcell.missing { border-left-style: none; margin-left: 0; }
  .mcell.missing { border: 1px dashed var(--err); border-left: 3px solid var(--err); margin-right: 0; color: var(--err); background: rgba(224, 92, 74, .12); }
  .mcell.missing:hover { background: rgba(224, 92, 74, .2); }
  .mcell.missing .figbox { color: var(--err); opacity: .9; }
  .miss-label { font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; color: var(--err); }

  .addbar-btn {
    align-self: center; margin-left: 12px;
    background: var(--s1); border: 1px dashed var(--teal); border-left: 3px dashed var(--teal);
    color: var(--teal); font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 1px; text-transform: uppercase; padding: 9px 13px;
    box-shadow: none; white-space: nowrap; transition: background .15s;
  }
  .addbar-btn:hover { background: rgba(68, 171, 180, .1); }
  .addbar-btn:active { transform: translateY(1px); }
  .addbar-btn.wide { align-self: flex-start; margin: 0 0 14px; }

  .addgroup-btn {
    display: inline-flex; align-items: center; gap: 12px;
    background: var(--s1); border: 1px dashed var(--teal); border-left: 3px dashed var(--teal);
    color: var(--teal); font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; padding: 10px 16px;
    box-shadow: none; transition: background .15s;
  }
  .addgroup-btn:hover { background: rgba(68, 171, 180, .1); }
  .addgroup-btn .glabel { color: var(--teal); border-color: var(--teal); }

  /* structure cells */
  .scell { gap: 10px; min-height: 46px; padding: 4px 16px; }
  .scell .sname { font-family: var(--font-ui); font-weight: 400; font-size: calc(var(--txt-base) * var(--sec-scale, 1)); letter-spacing: .5px; white-space: nowrap; }
  .scell .sletter {
    font-family: var(--font-ui); font-size: calc(17px * var(--sec-scale, 1)); color: var(--accent);
    background: var(--s1); border: 1px solid var(--s3);
    min-width: calc(30px * var(--sec-scale, 1)); height: calc(30px * var(--sec-scale, 1));
    display: inline-flex; align-items: center; justify-content: center; padding: 0 4px;
  }
  .scell .sreps { font-family: var(--font-mono); font-size: calc(13px * var(--sec-scale, 1)); color: var(--primary); letter-spacing: 1px; }

  /* lyrics */
  .lyrics { display: flex; flex-direction: column; gap: 18px; align-items: flex-start; }
  .lyric-sec {
    display: flex; flex-direction: column; gap: 5px; text-align: left;
    background: transparent; border: 0; border-left: 3px solid transparent;
    padding: 2px 0 2px 12px; margin-left: -15px; color: var(--text); width: 100%;
  }
  .lyric-sec.editable { cursor: pointer; }
  .lyric-sec.editable:hover { border-left-color: var(--accent); background: var(--s1); }
  .lyric-sec:disabled { cursor: default; }
  .lyric-name { font-family: var(--font-mono); font-size: calc(11px * var(--sec-scale, 1)); color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .lyric-text { font-family: var(--font-ui); font-weight: 300; white-space: pre-wrap; line-height: 1.7; font-size: calc(var(--txt-base) * var(--sec-scale, 1)); color: var(--text); }

  /* hide screen while printing */
  @media print {
    .screen-root, .page-layer { display: none !important; }
    body { background: #fff; }
  }
  .print-sheet { display: none; }

  /* ══════════ PRINT SHEET (max 90% black per spec, never pure #000) ══════════ */
  @media print {
    .print-sheet {
      display: block;
      font-family: 'Ubuntu', sans-serif;
      color: rgba(0,0,0,.9);
      background: #fff;
    }
    .p-song { display: flex; flex-direction: column; min-height: 100%; }
    .p-song.page-break { break-after: page; }
    .p-title {
      font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 12px; margin-bottom: 6px;
      color: rgba(0,0,0,.9);
    }
    .p-icon { width: 30px; height: 30px; object-fit: contain; filter: grayscale(1) opacity(.75); flex: none; }
    .p-meta { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(0,0,0,.65); margin-bottom: 20px; }
    .p-body { flex: 1; }
    .p-footer {
      margin-top: auto; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.15);
      display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap;
      font-size: 8.5px; letter-spacing: 1px; color: rgba(0,0,0,.55);
    }
    .p-h { font-size: 11px; letter-spacing: 3px; color: rgba(0,0,0,.55); border-bottom: 1px solid rgba(0,0,0,.15); padding-bottom: 5px; margin: 18px 0 14px; }
    /* d: clear separation between chord groups (a, b, c…) */
    .p-grp { display: flex; gap: 12px; margin-bottom: 26px; padding-bottom: 18px; align-items: center; break-inside: avoid; border-bottom: 1px dashed rgba(0,0,0,.12); }
    .p-grp:last-of-type { border-bottom: 0; margin-bottom: 14px; padding-bottom: 0; }
    /* c: gray fill, no border, for the a/b/c letter badges */
    .p-glabel {
      font-size: 17px; color: rgba(0,0,0,.75); background: #E7E5E0; border: 0;
      width: 34px; height: 34px; flex: none; display: inline-flex; align-items: center; justify-content: center;
    }
    /* b: center the whole row of measures, same as on-screen */
    .p-bars { justify-content: center; }
    .p-bars .mcell { border-left: 2px solid rgba(0,0,0,.45); border-right: 2px solid rgba(0,0,0,.45); margin-right: -2px; min-height: 44px; color: rgba(0,0,0,.9); padding: 3px 11px; justify-content: center; }
    .p-bars .chord { font-size: 26px; color: rgba(0,0,0,.9); font-family: 'Ubuntu', sans-serif; }
    .p-bars .figbox { color: rgba(0,0,0,.9); }
    .p-bars .scell .sname { font-size: 12px; }
    .p-bars .scell .sletter { color: rgba(0,0,0,.75); background: #E7E5E0; border: 0; min-width: 24px; height: 24px; font-size: 12px; }
    .p-bars .scell .sreps { color: rgba(0,0,0,.75); font-size: 12px; }
    .p-lyrics { break-inside: auto; }
    .p-lyr-inner { background: #F4F4F2; padding: 14px 18px; columns: 2; column-gap: 26px; }
    .p-lyr-inner .p-h { break-after: avoid; column-span: all; }
    .p-lyr-sec { margin-bottom: 12px; break-inside: avoid; }
    .p-lyr-name { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #C25F00; margin-bottom: 3px; font-weight: 500; }
    .p-lyr-text { font-size: 12px; line-height: 1.6; white-space: pre-wrap; color: rgba(0,0,0,.9); }
    /* g: lyrics-only (no chords) gets 3 columns instead of 2 when it fits */
    .p-song.lyrics-only .p-lyr-inner { columns: 3; }

    /* side-by-side: shrink so both fit */
    .p-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
    .side .p-bars .chord { font-size: 18px; }
    .side .p-bars .mcell { min-height: 32px; padding: 2px 8px; gap: 5px; }
    .side .p-bars .notefig { transform: scale(.72); transform-origin: bottom left; }
    .side .p-glabel { width: 26px; height: 26px; font-size: 13px; }
    .side .p-lyr-text { font-size: 11px; }
    .side .p-lyr-inner { padding: 10px 12px; columns: 1; }
    /* landscape: tighter still */
    .landscape .p-title { font-size: 22px; margin-bottom: 4px; }
    .landscape .p-meta { margin-bottom: 10px; }
    .landscape .p-bars .chord { font-size: 15px; }
    .landscape .p-lyr-text { font-size: 10px; line-height: 1.5; }
    .landscape .p-h { margin: 10px 0 8px; }
  }
</style>
